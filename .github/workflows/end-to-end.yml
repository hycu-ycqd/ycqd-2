name: End-to-End CI with Custom Action and Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install custom-action dependencies
        run: |
          cd custom-action
          npm install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies (if present)
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Run custom action (artifact creator)
        uses: ./custom-action
        with:
          example-input: 'This is a test artifact from custom action.'

      - name: Archive artifact.txt
        uses: actions/upload-artifact@v4
        with:
          name: custom-action-artifact
          path: artifact.txt

      - name: List files in workspace
        run: ls -l
